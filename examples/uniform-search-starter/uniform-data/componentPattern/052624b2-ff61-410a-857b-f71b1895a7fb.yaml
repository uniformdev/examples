        _overridability:
          hideLockedParameters: true
    search-bottom:
      - _id: 0c8baa9c-6493-4d67-ad16-7211efbe42eb
        type: searchPageSize
        _overridability:
          hideLockedParameters: true
      - _id: c4c119f4-5b14-4927-a1fc-06af1f68d363
        type: searchPagination
        _overridability:
          hideLockedParameters: true
  _dataResources:
    Author List:
      type: authorList
      variables:
        locale: ${locale}
        search: ''
        filters: '{"type[eq]":"author"}'
        contentTypes: author
      isPatternParameter: true
      ignorePatternParameterDefault: false
  _overridability:
    parameters:
      boostEnrichments: 'yes'
    hideLockedParameters: true
  _locales:
    - en-us
