                                  Item/entry/fields/name/value}
                            value:
                              type: text
                              value: >-
                                ${#jptr:/Author List entries Loop
                                Item/entry/_slug}
                  _dataResources:
                    Author List entries Loop Item:
                      type: sys-reserved-loop
                      variables:
                        connectedData: '#jptr:/Author List/entries:fa=c'
